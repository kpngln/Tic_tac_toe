<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>井字棋游戏</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 开始界面 -->
<div id="start-screen" class="screen">
    <h1>井字棋游戏</h1>

    <label>棋盘规格</label>
    <select id="board-size">
        <option value="3">3 × 3</option>
        <option value="4">4 × 4</option>
        <option value="5">5 × 5</option>
    </select>

    <label>对战模式</label>
    <select id="game-mode">
        <option value="pvp">玩家对战</option>
        <option value="ai">人机对战</option>
    </select>

    <label>AI难度</label>
    <select id="ai-level">
        <option value="easy">简单</option>
        <option value="medium">中等</option>
        <option value="hard">困难</option>
    </select>

    <label>先手选择</label>
    <select id="first-player">
        <option value="X">黑棋(X)</option>
        <option value="O">白棋(O)</option>
    </select>

    <button id="start-btn">开始对战</button>
</div>

<!-- 游戏界面 -->
<div id="game-screen" class="screen" style="display:none;">
    <div class="top-bar">
        <div id="current-player">当前：X</div>
        <div id="game-result"></div>
        <div id="timer">时间：0s</div>
    </div>

    <div id="game-board" class="board"></div>

    <div class="game-info">
        <div class="history-section">
            <h3>历史记录</h3>
            <ul id="move-history"></ul>
        </div>
    </div>

    <div class="btn-group">
        <button id="undo-btn">悔棋</button>
        <span id="undo-timer">10s</span>
        <button id="reset-btn">重新开始</button>
        <button id="exit-btn">退出</button>
    </div>
</div>

<!-- 提示框 -->
<div id="toast-container" class="toast-container">
    <div id="toast" class="toast">
        <span id="toast-icon" class="toast-icon">💭</span>
        <span id="toast-message"></span>
        <button id="toast-close" class="toast-close">×</button>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
